<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anamorphic 4-Side Shadow Box Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="webgl-container"></div>

    <div id="ui-overlay">
        <div class="ui-header">
            <h1><i class="fas fa-cube"></i> Shadow Box Gen</h1>
        </div>

        <!-- Card 01: Silhouette Input -->
        <div class="card active" id="card-01">
            <div class="card-header" onclick="toggleCard('card-01')">
                <span>01. Silhouette Input</span>
                <i class="fas fa-minus toggle-icon"></i>
            </div>
            <div class="card-body">
                <p class="info-text">Upload ONE asymmetrical SVG. It will be rotation-compensated for all 4 sides automatically.</p>
                <div class="upload-zone" id="upload-zone">
                    <label for="svg-input"><i class="fas fa-upload"></i> Upload Target SVG</label>
                    <input type="file" id="svg-input" accept=".svg" hidden>
                    <span class="file-name" id="file-name">No file selected</span>
                </div>
            </div>
        </div>

        <!-- Card 02: Geometry & Distances -->
        <div class="card" id="card-02">
            <div class="card-header" onclick="toggleCard('card-02')">
                <span>02. Geometry & Distances</span>
                <i class="fas fa-plus toggle-icon"></i>
            </div>
            <div class="card-body">
                <div class="slider-group">
                    <label>Box Size (Width/Height): <span id="val-box-size">100</span>mm</label>
                    <input type="range" id="box-size" min="50" max="200" value="100">
                </div>
                <div class="slider-group">
                    <label>Light Source Y (Height): <span id="val-light-y">0</span>mm</label>
                    <input type="range" id="light-y" min="-50" max="50" value="0">
                </div>
                <div class="slider-group">
                    <label>Light Source Z (Depth): <span id="val-light-z">0</span>mm</label>
                    <input type="range" id="light-z" min="-50" max="50" value="0">
                </div>
                <div class="slider-group">
                    <label>Distance to Wall: <span id="val-wall-dist">400</span>mm</label>
                    <input type="range" id="wall-dist" min="200" max="800" value="400">
                </div>
            </div>
        </div>

        <!-- Card 03: Material & Fabrication -->
        <div class="card" id="card-03">
            <div class="card-header" onclick="toggleCard('card-03')">
                <span>03. Material & Fabrication</span>
                <i class="fas fa-plus toggle-icon"></i>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label for="thickness">Acrylic Thickness</label>
                    <select id="thickness">
                        <option value="2">2mm</option>
                        <option value="3" selected>3mm</option>
                        <option value="5">5mm</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Card 04: Export Tool -->
        <div class="card" id="card-04">
            <div class="card-header" onclick="toggleCard('card-04')">
                <span>04. Export Tool</span>
                <i class="fas fa-plus toggle-icon"></i>
            </div>
            <div class="card-body">
                <button id="export-btn" class="export-btn">
                    <i class="fas fa-download"></i> Generate Laser-Ready SVG
                </button>
                <div id="export-status" class="export-status"></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
